name: Update Contributions

on:
  schedule:
    # Monthly full sync at 00:01 UTC on the 1st of the month
    - cron: '1 0 1 * *'
    # Daily update at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run_scheduled_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Conditionally run full sync or daily update
        run: |
          if [ "$SCHEDULE" = "1 0 1 * *" ]; then
            echo "Running monthly full sync..."
            rm -f data/all-contributions.json
            rm -f data/commit-cache.json
            rm -f data/pr-cache.json
            rm -f data/all-articles.json
            rm -f data/ongoing-tasks.json
            rm -f data/ongoing-issues.json
            rm -f data/ongoing-prs.json
            node scripts/src/main.js
          else
            echo "Running daily update..."
            node scripts/src/main.js
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCHEDULE: ${{ github.event.schedule }}

      - name: Format generated files
        run: npm run format
        
      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add contributions/markdown-generated/ contributions/html-generated/ data/
          
          if ! git diff --staged --quiet; then
            # Determine the commit message based on schedule
            if [ "$SCHEDULE" = "1 0 1 * *" ]; then
                MSG="docs: Monthly full sync"
            else
                MSG="docs: Daily contributions update"
            fi

            if [ "${{ github.repository }}" = "adiati98/oss-portfolio" ]; then
                echo "Applying optimized deployment and updating live branch."
                git commit -m "$MSG [skip ci]"
                git push origin main
                git push origin main:live --force
            else
                echo "Executing deployment update."
                git commit -m "$MSG"
                git push origin main
            fi

            echo "pushed=true" >> $GITHUB_OUTPUT 
          else
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi
        env:
          SCHEDULE: ${{ github.event.schedule }}